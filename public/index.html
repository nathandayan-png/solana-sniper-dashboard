<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Sniper Bot - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    .tab-btn { @apply px-6 py-3 rounded-t-lg font-semibold transition cursor-pointer; }
    .tab-btn-active { @apply bg-gray-800 text-white; }
    .tab-btn-inactive { @apply bg-gray-700 text-gray-400 hover:bg-gray-600; }
    .tab-content { @apply hidden; }
    .tab-content-active { @apply block; }
    .trade-win { background-color: rgba(34, 197, 94, 0.1); border-left: 3px solid #22c55e; }
    .trade-loss { background-color: rgba(239, 68, 68, 0.1); border-left: 3px solid #ef4444; }
  </style>
</head>
<body class="bg-gray-900 text-white">
  
  <!-- Login -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center gradient-bg">
    <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md">
      <h1 class="text-3xl font-bold mb-6 text-center">🚀 Solana Sniper Bot</h1>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Mot de passe</label>
          <input type="password" id="password-input" class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Entrez le mot de passe" required />
        </div>
        <button type="submit" class="w-full py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold transition">Se connecter</button>
        <p id="login-error" class="text-red-300 text-sm text-center hidden"></p>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    
    <!-- Header -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <h1 class="text-2xl font-bold">🚀 Solana Sniper</h1>
          <span id="bot-status" class="px-3 py-1 rounded-full text-sm font-medium bg-gray-700">⏸️ Arrêté</span>
        </div>
        <div class="flex items-center space-x-4">
          <div class="text-right">
            <div class="text-sm text-gray-400">Balance</div>
            <div id="wallet-balance" class="text-xl font-bold">0.0000 SOL</div>
          </div>
          <button onclick="logout()" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">Déconnexion</button>
        </div>
      </div>
    </nav>

    <div class="p-6 space-y-6">
      
      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
          <div class="text-gray-400 text-sm mb-2">Total Trades</div>
          <div id="stat-total-trades" class="text-3xl font-bold">0</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
          <div class="text-gray-400 text-sm mb-2">Win Rate</div>
          <div id="stat-win-rate" class="text-3xl font-bold text-green-400">0%</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
          <div class="text-gray-400 text-sm mb-2">P&L Total</div>
          <div id="stat-pnl" class="text-3xl font-bold">0 SOL</div>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
          <div class="text-gray-400 text-sm mb-2">Positions Ouvertes</div>
          <div id="stat-open-positions" class="text-3xl font-bold text-blue-400">0</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
        <div class="flex border-b border-gray-700">
          <div class="tab-btn tab-btn-active" onclick="switchTab('positions')">💰 Positions</div>
          <div class="tab-btn tab-btn-inactive" onclick="switchTab('history')">📋 Historique</div>
          <div class="tab-btn tab-btn-inactive" onclick="switchTab('events')">📡 Événements</div>
        </div>

        <!-- Tab: Positions -->
        <div id="tab-positions" class="tab-content tab-content-active p-6">
          <div id="positions-list" class="space-y-4">
            <p class="text-gray-400 text-center py-8">Aucune position ouverte</p>
          </div>
        </div>

        <!-- Tab: Historique -->
        <div id="tab-history" class="tab-content p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-semibold">📋 Derniers Trades Fermés</h3>
            <button onclick="loadHistory()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg text-sm transition">🔄 Rafraîchir</button>
          </div>
          <div id="history-list" class="space-y-3">
            <p class="text-gray-400 text-center py-8">Chargement...</p>
          </div>
        </div>

        <!-- Tab: Événements -->
        <div id="tab-events" class="tab-content p-6">
          <div id="events-list" class="space-y-2 max-h-96 overflow-y-auto">
            <p class="text-gray-400 text-center py-8">Aucun événement</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    let socket;
    let authenticated = false;

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password-input').value;
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.success) {
        authenticated = true;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        initDashboard();
      } else {
        document.getElementById('login-error').textContent = 'Mot de passe incorrect';
        document.getElementById('login-error').classList.remove('hidden');
      }
    });

    function logout() {
      authenticated = false;
      if (socket) socket.disconnect();
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('password-input').value = '';
    }

    // Tabs
    function switchTab(tab) {
      ['positions', 'history', 'events'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.remove('tab-content-active');
        document.getElementById(`tab-${t}`).classList.add('tab-content');
      });
      document.getElementById(`tab-${tab}`).classList.add('tab-content-active');
      document.getElementById(`tab-${tab}`).classList.remove('tab-content');

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-btn-active');
        btn.classList.add('tab-btn-inactive');
      });
      event.target.classList.add('tab-btn-active');
      event.target.classList.remove('tab-btn-inactive');

      if (tab === 'history') loadHistory();
    }

    // Init
    function initDashboard() {
      socket = io();
      
      socket.on('connect', () => console.log('✅ Connecté au serveur'));
      
      socket.on('initial-state', (state) => {
        updateStats(state.stats);
        updateWallet(state.walletBalance);
        updateBotStatus(state.running);
        updatePositions(state.positions);
      });

      socket.on('bot-status', (data) => updateBotStatus(data.running));
      socket.on('wallet-update', (data) => updateWallet(data.balance));
      socket.on('stats-update', (stats) => updateStats(stats));
      socket.on('positions-update', (data) => updatePositions(data.positions));
      socket.on('event', (event) => addEvent(event));
      socket.on('trade-closed', (trade) => {
        loadHistory();
        addEvent({ type: 'TRADE_CLOSED', data: trade, timestamp: new Date() });
      });

      loadHistory();
    }

    function updateBotStatus(running) {
      const el = document.getElementById('bot-status');
      if (running) {
        el.textContent = '▶️ En cours';
        el.className = 'px-3 py-1 rounded-full text-sm font-medium bg-green-600';
      } else {
        el.textContent = '⏸️ Arrêté';
        el.className = 'px-3 py-1 rounded-full text-sm font-medium bg-gray-700';
      }
    }

    function updateWallet(balance) {
      document.getElementById('wallet-balance').textContent = (balance || 0).toFixed(4) + ' SOL';
    }

    function updateStats(stats) {
      document.getElementById('stat-total-trades').textContent = stats.totalTrades || 0;
      document.getElementById('stat-win-rate').textContent = (stats.winRate || 0).toFixed(1) + '%';
      const pnl = stats.totalPnL || 0;
      const pnlEl = document.getElementById('stat-pnl');
      pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(4) + ' SOL';
      pnlEl.className = 'text-3xl font-bold ' + (pnl >= 0 ? 'text-green-400' : 'text-red-400');
    }

    function updatePositions(positions) {
      const el = document.getElementById('positions-list');
      document.getElementById('stat-open-positions').textContent = (positions || []).length;
      
      if (!positions || positions.length === 0) {
        el.innerHTML = '<p class="text-gray-400 text-center py-8">Aucune position ouverte</p>';
        return;
      }

      el.innerHTML = positions.map(p => {
        const pnl = p.pnl || 0;
        const elapsed = Math.floor((Date.now() - new Date(p.timestamp || Date.now()).getTime()) / 1000 / 60);
        return `
          <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-bold text-lg">${p.symbol}</div>
                <div class="text-sm text-gray-400">${p.address?.substring(0, 8)}...</div>
              </div>
              <div class="text-right">
                <div class="text-lg font-bold ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}">
                  ${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%
                </div>
                <div class="text-sm text-gray-400">${elapsed}min</div>
              </div>
            </div>
            <div class="mt-2 grid grid-cols-2 gap-2 text-sm">
              <div><span class="text-gray-400">Entrée:</span> $${(p.entryPrice || 0).toFixed(8)}</div>
              <div><span class="text-gray-400">Actuel:</span> $${(p.currentPrice || 0).toFixed(8)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadHistory() {
      try {
        const res = await fetch('/api/trades/closed?limit=50');
        const trades = await res.json();
        const el = document.getElementById('history-list');
        
        if (!trades || trades.length === 0) {
          el.innerHTML = '<p class="text-gray-400 text-center py-8">Aucun trade fermé</p>';
          return;
        }

        el.innerHTML = trades.map(t => {
          const pnl = t.pnl || 0;
          const pnlPercent = t.pnlPercent || 0;
          const duration = Math.floor((t.holdTimeSeconds || 0) / 60);
          const entryDate = new Date(t.entryTime).toLocaleString('fr-FR', { 
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
          });
          const exitDate = new Date(t.exitTime).toLocaleString('fr-FR', { 
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
          });
          
          return `
            <div class="p-4 rounded-lg ${pnl >= 0 ? 'trade-win' : 'trade-loss'}">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <div class="font-bold text-lg">${t.symbol}</div>
                  <div class="text-sm text-gray-400">${t.name}</div>
                </div>
                <div class="text-right">
                  <div class="text-lg font-bold ${pnl >= 0 ? 'text-green-400' : 'text-red-400'}">
                    ${pnl >= 0 ? '+' : ''}${pnl.toFixed(4)} SOL
                  </div>
                  <div class="text-sm ${pnlPercent >= 0 ? 'text-green-300' : 'text-red-300'}">
                    ${pnlPercent >= 0 ? '+' : ''}${pnlPercent.toFixed(2)}%
                  </div>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-2 text-xs text-gray-400">
                <div>📥 ${entryDate}</div>
                <div>📤 ${exitDate}</div>
                <div>⏱️ ${duration}min</div>
                <div class="text-right">
                  <span class="px-2 py-1 rounded ${
                    t.exitReason === 'take_profit' ? 'bg-green-600/20 text-green-300' :
                    t.exitReason === 'trailing_stop' ? 'bg-yellow-600/20 text-yellow-300' :
                    'bg-red-600/20 text-red-300'
                  }">
                    ${t.exitReason === 'take_profit' ? '🎯 TP' : 
                      t.exitReason === 'trailing_stop' ? '📈 Trail' : '🛑 SL'}
                  </span>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Erreur chargement historique:', err);
      }
    }

    function addEvent(event) {
      const el = document.getElementById('events-list');
      if (el.querySelector('.text-gray-400')) el.innerHTML = '';
      
      const time = new Date(event.timestamp).toLocaleTimeString('fr-FR');
      const div = document.createElement('div');
      div.className = 'text-sm p-2 bg-gray-700 rounded';
      div.innerHTML = `<span class="text-gray-400">${time}</span> <span class="font-semibold">${event.type}</span>`;
      el.prepend(div);
      
      if (el.children.length > 50) el.lastChild.remove();
    }
  </script>

</body>
</html>
